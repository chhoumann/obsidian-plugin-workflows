name: Self test

# CI for this repo's own PRs. The reusable ci.yml is workflow_call-only and
# serves consumers; without this file the release-pipeline scripts have no
# gate on their own changes.

on:
    push:
        branches: [main]
    pull_request:

permissions: {}

concurrency:
    group: self-test-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

            - name: Setup Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install
              run: pnpm install --frozen-lockfile

            - name: Test
              run: npm test
