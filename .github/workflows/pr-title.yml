name: PR Title

# Reusable Conventional-Commit PR title validation for Obsidian plugin repos.
#
# Releases are driven by semantic-release from the squash-merge commit, which is
# the PR title. Validating it as a Conventional Commit means a bad title can't
# produce a wrong (or missing) release.
#
# The caller MUST trigger on `pull_request_target` (not `pull_request`): the
# title of a fork PR is only reliably readable, and GITHUB_TOKEN only carries the
# needed context, under pull_request_target. This workflow never checks out or
# runs PR head code, so pull_request_target is safe here. See
# templates/caller-workflows/pr-title.yml.

on:
    workflow_call:
        inputs:
            types:
                description: |
                    Newline-separated Conventional Commit types to allow.
                    Defaults to the standard set used across the plugin repos.
                type: string
                required: false
                default: |
                    feat
                    fix
                    perf
                    docs
                    style
                    refactor
                    test
                    build
                    ci
                    chore
                    revert

permissions:
    pull-requests: read

concurrency:
    group: pr-title-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    validate:
        name: Validate PR title
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit
            - name: Lint PR title
              uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  types: ${{ inputs.types }}
