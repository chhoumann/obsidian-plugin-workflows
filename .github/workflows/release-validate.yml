name: Reusable release validate

# Stage 2 of the forensic PR-to-release pipeline. Invoked from the consumer's
# pull_request_target caller stub the instant a release PR merges (or from a
# workflow_dispatch recovery on the default branch). It performs the full
# merged-PR forensics against the GitHub API, downloads the version files at
# the base, release, and previous-tag commits, and hands them to the pinned
# release-contract script - the single semantic model for version-file
# validation - so this workflow cannot drift from the contract. It never checks
# out or runs PR head code; the only checkout is the pinned toolkit. On success
# it pins the exact release commit on a durable release-run/<version> recovery
# branch and dispatches the release workflow. The pull_request_target trigger
# itself cannot be workflow_call, so it stays in the caller stub.

on:
    workflow_call:
        inputs:
            pr-number:
                description: "Merged release PR number."
                type: string
                required: true
            plugin-name:
                description: "Marker-string prefix (must match [a-z0-9-]+)."
                type: string
                required: true
            package-name:
                description: "Expected package.json name. Defaults to plugin-name."
                type: string
                required: false
                default: ""
            manifest-id:
                description: "Expected manifest.json id. Defaults to plugin-name."
                type: string
                required: false
                default: ""
            default-branch:
                description: "Release branch that PRs target."
                type: string
                required: false
                default: master
            package-manager:
                description: "npm or pnpm. Drives the expected release-file set."
                type: string
                required: false
                default: npm
            release-bot-app-slug:
                description: "GitHub App slug; the expected PR author is <slug>[bot]."
                type: string
                required: true
            release-merger-login:
                description: "Login required to have merged the PR. Empty means the repo owner."
                type: string
                required: false
                default: ""
            release-workflow:
                description: "Workflow file in the consumer repo to dispatch for the release."
                type: string
                required: false
                default: release.yml
            workflows-repository:
                description: "Repository holding the release toolkit scripts."
                type: string
                required: false
                default: chhoumann/obsidian-plugin-workflows
            workflows-ref:
                description: "Ref of workflows-repository to check out. Keep in sync with the uses: pin."
                type: string
                required: false
                default: v3

permissions: {}

concurrency:
    group: release-validate-${{ github.repository }}
    cancel-in-progress: false

jobs:
    validate:
        name: Validate and dispatch release
        runs-on: ubuntu-latest
        permissions:
            actions: write
            contents: write
            pull-requests: read
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout release toolkit
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  repository: ${{ inputs.workflows-repository }}
                  ref: ${{ inputs.workflows-ref }}
                  path: .release-toolkit
                  persist-credentials: false

            - name: Resolve release file set
              id: files
              env:
                  PACKAGE_MANAGER: ${{ inputs.package-manager }}
              run: |
                  LIST="$(node .release-toolkit/scripts/release-contract.mjs files --package-manager "$PACKAGE_MANAGER" | jq -c '.files')"
                  echo "list=$LIST" >> "$GITHUB_OUTPUT"

            - name: Forensically validate merged release PR
              id: forensics
              uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
              env:
                  PR_NUMBER: ${{ inputs.pr-number }}
                  PLUGIN_NAME: ${{ inputs.plugin-name }}
                  DEFAULT_BRANCH: ${{ inputs.default-branch }}
                  RELEASE_FILES: ${{ steps.files.outputs.list }}
                  BOT_APP_SLUG: ${{ inputs.release-bot-app-slug }}
                  MERGER_LOGIN: ${{ inputs.release-merger-login }}
                  EVENT_REF: ${{ github.ref }}
                  EVENT_SHA: ${{ github.sha }}
                  EVENT_NAME: ${{ github.event_name }}
              with:
                  script: |
                      const fs = require('node:fs');
                      const path = require('node:path');

                      // Bounded retry for read-only forensic calls: a transient 5xx from the
                      // API must not abandon a release the maintainer already merged.
                      async function retryRead(thunk) {
                        let lastError;
                        for (let attempt = 0; attempt < 4; attempt += 1) {
                          try {
                            return await thunk();
                          } catch (error) {
                            const status = error?.status ?? 0;
                            if (status < 500 || status > 599) throw error;
                            lastError = error;
                            if (attempt < 3) {
                              await new Promise((resolve) => setTimeout(resolve, 1000 * (attempt + 1)));
                            }
                          }
                        }
                        throw lastError;
                      }

                      const plugin = process.env.PLUGIN_NAME;
                      if (!/^[a-z0-9-]+$/.test(plugin)) {
                        throw new Error(`plugin-name must match [a-z0-9-]+: ${plugin}`);
                      }
                      const defaultBranch = process.env.DEFAULT_BRANCH;
                      const botLogin = `${process.env.BOT_APP_SLUG}[bot]`;
                      const releaseFiles = JSON.parse(process.env.RELEASE_FILES);
                      const { owner, repo } = context.repo;
                      const repository = `${owner}/${repo}`;
                      const mergerLogin = process.env.MERGER_LOGIN || owner;
                      const pullNumber = Number(process.env.PR_NUMBER);
                      if (!Number.isSafeInteger(pullNumber) || pullNumber < 1) {
                        throw new Error('Release event has an invalid PR number.');
                      }

                      const { data: pull } = await retryRead(() =>
                        github.rest.pulls.get({ owner, repo, pull_number: pullNumber }));
                      if (!pull.merged || pull.state !== 'closed' || !pull.merged_at || !pull.merge_commit_sha) {
                        throw new Error(`PR #${pullNumber} is not merged.`);
                      }
                      if (pull.user?.login !== botLogin) {
                        throw new Error(`PR #${pullNumber} was not created by ${botLogin}.`);
                      }
                      if (pull.merged_by?.login !== mergerLogin) {
                        throw new Error(`PR #${pullNumber} was not merged by ${mergerLogin}.`);
                      }
                      const branchMatch = /^release\/((?:0|[1-9]\d*)\.(?:0|[1-9]\d*)\.(?:0|[1-9]\d*))$/.exec(pull.head.ref);
                      if (!branchMatch) throw new Error(`PR #${pullNumber} does not use a valid release branch.`);
                      const version = branchMatch[1];
                      const title = `release(version): Release ${version}`;

                      const markerPattern = new RegExp(
                        `<!-- ${plugin}-release-pr schema=1 version=${version.replaceAll('.', '\\.')}` +
                        ' base=([0-9a-f]{40}) -->',
                      );
                      const marker = markerPattern.exec(pull.body || '');
                      if (!marker) throw new Error(`PR #${pullNumber} is missing valid release provenance.`);
                      const baseSha = marker[1];

                      const files = await retryRead(() => github.paginate(github.rest.pulls.listFiles, {
                        owner,
                        repo,
                        pull_number: pullNumber,
                        per_page: 100,
                      }));
                      const changedFiles = files.map((file) => file.filename).sort();

                      const headCommit = await retryRead(() =>
                        github.rest.git.getCommit({ owner, repo, commit_sha: pull.head.sha }));
                      if (headCommit.data.parents.length !== 1 || headCommit.data.parents[0].sha !== baseSha) {
                        throw new Error(`PR #${pullNumber} head does not descend directly from its recorded base.`);
                      }
                      if (headCommit.data.message.trim() !==
                          `${title}\n\n${plugin}-release-commit schema=1 version=${version} base=${baseSha}`) {
                        throw new Error(`PR #${pullNumber} head commit message is invalid.`);
                      }

                      const releaseSha = pull.merge_commit_sha;
                      const releaseCommit = await retryRead(() =>
                        github.rest.git.getCommit({ owner, repo, commit_sha: releaseSha }));
                      if (releaseCommit.data.parents.length !== 1 || releaseCommit.data.parents[0].sha !== baseSha) {
                        throw new Error(`PR #${pullNumber} was not squash-merged directly onto its recorded base.`);
                      }
                      // GitHub's "Default to pull request title" squash setting omits the
                      // " (#N)" suffix; both subjects are generated, so both are accepted.
                      const mergeSubject = releaseCommit.data.message.split('\n', 1)[0];
                      if (mergeSubject !== title && mergeSubject !== `${title} (#${pullNumber})`) {
                        throw new Error(`PR #${pullNumber} merge commit message is invalid.`);
                      }
                      if (releaseCommit.data.tree.sha !== headCommit.data.tree.sha) {
                        throw new Error(`PR #${pullNumber} merge tree does not match its validated head tree.`);
                      }

                      // The merge event runs from the default branch at the merge commit. An
                      // explicit workflow_dispatch recovery (re-validating an already-merged
                      // release PR, e.g. after a toolkit fix) runs from the current
                      // default-branch head instead: everything above and below is
                      // re-derived from the PR number, and the ancestry check still binds
                      // the release commit to the protected branch. This mirrors the
                      // trusted recovery source model of the release workflow (stage 3).
                      // Every other event keeps the exact merge-commit pin.
                      const branchHead = await retryRead(() =>
                        github.rest.git.getRef({ owner, repo, ref: `heads/${defaultBranch}` }));
                      const exactMergeEvent =
                        process.env.EVENT_REF === `refs/heads/${defaultBranch}` &&
                        process.env.EVENT_SHA === releaseSha;
                      const trustedBranchRecovery =
                        process.env.EVENT_NAME === 'workflow_dispatch' &&
                        process.env.EVENT_REF === `refs/heads/${defaultBranch}` &&
                        process.env.EVENT_SHA === branchHead.data.object.sha;
                      if (!exactMergeEvent && !trustedBranchRecovery) {
                        throw new Error(
                          `Release trigger must run from ${defaultBranch} at the merge commit ` +
                          `${releaseSha}, or be dispatched from the current branch head for ` +
                          `recovery; got ${process.env.EVENT_NAME} on ${process.env.EVENT_REF} ` +
                          `at ${process.env.EVENT_SHA}.`,
                        );
                      }

                      const comparison = await retryRead(() => github.rest.repos.compareCommitsWithBasehead({
                        owner,
                        repo,
                        basehead: `${releaseSha}...${branchHead.data.object.sha}`,
                      }));
                      if (!['ahead', 'identical'].includes(comparison.data.status) ||
                          comparison.data.merge_base_commit.sha !== releaseSha) {
                        throw new Error(`Release commit ${releaseSha} is not on current ${defaultBranch}.`);
                      }

                      async function downloadVersionFiles(ref, root) {
                        fs.mkdirSync(root, { recursive: true });
                        for (const file of releaseFiles) {
                          const response = await retryRead(() =>
                            github.rest.repos.getContent({ owner, repo, path: file, ref }));
                          const data = response.data;
                          if (Array.isArray(data) || data.type !== 'file' || data.encoding !== 'base64' ||
                              typeof data.content !== 'string') {
                            throw new Error(`Unable to read regular release file ${file} at ${ref}.`);
                          }
                          fs.writeFileSync(path.join(root, file), Buffer.from(data.content, 'base64'), {
                            flag: 'wx',
                          });
                        }
                      }

                      const temp = process.env.RUNNER_TEMP;
                      const baseRoot = path.join(temp, 'release-base');
                      const candidateRoot = path.join(temp, 'release-candidate');
                      const previousRoot = path.join(temp, 'release-previous');
                      await downloadVersionFiles(baseSha, baseRoot);
                      await downloadVersionFiles(releaseSha, candidateRoot);

                      // The contract script re-validates full version-file synchronization;
                      // this parse only locates the previous release tag to download.
                      const basePackage = JSON.parse(fs.readFileSync(path.join(baseRoot, 'package.json'), 'utf8'));
                      const baseVersion = basePackage?.version;
                      if (typeof baseVersion !== 'string' ||
                          !/^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/.test(baseVersion)) {
                        throw new Error('Base package.json does not record a stable semantic version.');
                      }

                      async function resolveTagCommit(tag) {
                        let reference;
                        try {
                          reference = await retryRead(() =>
                            github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` }));
                        } catch (error) {
                          if (error.status === 404) return null;
                          throw error;
                        }
                        let object = reference.data.object;
                        for (let depth = 0; object.type === 'tag' && depth < 5; depth += 1) {
                          const annotated = await retryRead(() =>
                            github.rest.git.getTag({ owner, repo, tag_sha: object.sha }));
                          object = annotated.data.object;
                        }
                        if (object.type !== 'commit') {
                          throw new Error(`Tag ${tag} does not resolve to a commit.`);
                        }
                        return object.sha;
                      }

                      const previousTagSha = await resolveTagCommit(baseVersion);
                      if (!previousTagSha) {
                        throw new Error(`Previous release tag ${baseVersion} does not exist.`);
                      }
                      await downloadVersionFiles(previousTagSha, previousRoot);
                      const previousComparison = await retryRead(() =>
                        github.rest.repos.compareCommitsWithBasehead({
                          owner,
                          repo,
                          basehead: `${previousTagSha}...${baseSha}`,
                        }));
                      if (!['ahead', 'identical'].includes(previousComparison.data.status) ||
                          previousComparison.data.merge_base_commit.sha !== previousTagSha) {
                        throw new Error(`Previous release tag ${baseVersion} is not an ancestor of the base.`);
                      }

                      const existingTagSha = await resolveTagCommit(version);
                      if (existingTagSha && existingTagSha !== releaseSha) {
                        throw new Error(`Tag ${version} points to ${existingTagSha}, expected ${releaseSha}.`);
                      }

                      const prInput = {
                        baseRef: pull.base.ref,
                        branch: pull.head.ref,
                        changedFiles,
                        defaultBranch,
                        headRepository: pull.head.repo?.full_name ?? '',
                        repository,
                        title: pull.title,
                        version,
                      };
                      fs.writeFileSync(path.join(temp, 'release-pr.json'), `${JSON.stringify(prInput, null, 2)}\n`, {
                        flag: 'wx',
                      });

                      core.setOutput('version', version);
                      core.setOutput('release-sha', releaseSha);
                      core.setOutput('pr-number', String(pullNumber));

            - name: Validate version-file contract
              env:
                  PACKAGE_MANAGER: ${{ inputs.package-manager }}
                  PACKAGE_NAME: ${{ inputs.package-name || inputs.plugin-name }}
                  MANIFEST_ID: ${{ inputs.manifest-id || inputs.plugin-name }}
              run: |
                  node .release-toolkit/scripts/release-contract.mjs validate-release \
                    --input "$RUNNER_TEMP/release-pr.json" \
                    --base-root "$RUNNER_TEMP/release-base" \
                    --candidate-root "$RUNNER_TEMP/release-candidate" \
                    --previous-root "$RUNNER_TEMP/release-previous" \
                    --package-name "$PACKAGE_NAME" \
                    --manifest-id "$MANIFEST_ID" \
                    --package-manager "$PACKAGE_MANAGER"

            - name: Pin release source and dispatch release
              uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
              env:
                  VERSION: ${{ steps.forensics.outputs.version }}
                  RELEASE_SHA: ${{ steps.forensics.outputs.release-sha }}
                  PR_NUMBER: ${{ steps.forensics.outputs.pr-number }}
                  PLUGIN_NAME: ${{ inputs.plugin-name }}
                  RELEASE_WORKFLOW: ${{ inputs.release-workflow }}
                  EVENT_NAME: ${{ github.event_name }}
                  DEFAULT_BRANCH: ${{ inputs.default-branch }}
              with:
                  script: |
                      // Bounded retry for read-only calls; writes are never retried.
                      async function retryRead(thunk) {
                        let lastError;
                        for (let attempt = 0; attempt < 4; attempt += 1) {
                          try {
                            return await thunk();
                          } catch (error) {
                            const status = error?.status ?? 0;
                            if (status < 500 || status > 599) throw error;
                            lastError = error;
                            if (attempt < 3) {
                              await new Promise((resolve) => setTimeout(resolve, 1000 * (attempt + 1)));
                            }
                          }
                        }
                        throw lastError;
                      }

                      const version = process.env.VERSION;
                      const releaseSha = process.env.RELEASE_SHA;
                      const pullNumber = Number(process.env.PR_NUMBER);
                      if (!/^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/.test(version) ||
                          !/^[0-9a-f]{40}$/.test(releaseSha) ||
                          !Number.isSafeInteger(pullNumber) || pullNumber < 1) {
                        throw new Error('Invalid validated release identity.');
                      }
                      const { owner, repo } = context.repo;

                      // The merge event pins the exact release source on a durable
                      // release-run/<version> branch and dispatches there, so a failed
                      // release stage can always be replayed at the exact commit. A
                      // workflow_dispatch recovery instead dispatches on the current
                      // default branch: the release stage then runs the consumer's
                      // CURRENT caller stub and toolkit pins - which is what makes
                      // "bump the pins, then recover" actually pick up the fix - and its
                      // trusted-branch-recovery source check re-derives and re-verifies
                      // the exact release commit, so this stays fail-closed. It also
                      // performs no ref writes, which some repos' Actions tokens reject
                      // for older commits whose workflow files differ from the head.
                      let dispatchRef = process.env.DEFAULT_BRANCH;
                      if (process.env.EVENT_NAME !== 'workflow_dispatch') {
                        // git cannot hold refs/heads/release-run and refs/heads/release-run/*
                        // at once, so a stale branch literally named "release-run" makes the
                        // recovery-branch createRef fail with an opaque 422. Preflight it into
                        // an actionable error instead.
                        const runNamespace = await retryRead(() =>
                          github.paginate(github.rest.git.listMatchingRefs, {
                            owner,
                            repo,
                            ref: 'heads/release-run',
                            per_page: 100,
                          }));
                        if (runNamespace.some((reference) => reference.ref === 'refs/heads/release-run')) {
                          throw new Error(
                            "A branch named 'release-run' exists and blocks creation of " +
                            'release-run/<version> recovery branches. Delete or rename that ' +
                            'branch, then re-run release validation.',
                          );
                        }

                        const runBranch = `release-run/${version}`;
                        let runRef;
                        try {
                          runRef = await retryRead(() =>
                            github.rest.git.getRef({ owner, repo, ref: `heads/${runBranch}` }));
                        } catch (error) {
                          if (error.status !== 404) throw error;
                        }
                        if (runRef && runRef.data.object.sha !== releaseSha) {
                          throw new Error(
                            `Recovery branch ${runBranch} points to ${runRef.data.object.sha}, expected ${releaseSha}.`,
                          );
                        }
                        if (!runRef) {
                          await github.rest.git.createRef({ owner, repo, ref: `refs/heads/${runBranch}`, sha: releaseSha });
                        }
                        dispatchRef = runBranch;
                      }

                      await github.rest.actions.createWorkflowDispatch({
                        owner,
                        repo,
                        workflow_id: process.env.RELEASE_WORKFLOW,
                        ref: dispatchRef,
                        inputs: { releasePr: String(pullNumber) },
                      });
                      core.notice(`Dispatched ${process.env.PLUGIN_NAME} ${version} from release PR #${pullNumber} at ${dispatchRef}.`);
