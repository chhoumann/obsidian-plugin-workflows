name: Reusable release validate

# Stage 2 of the forensic PR-to-release pipeline. Invoked from the consumer's
# pull_request_target caller stub the instant a release PR merges. It performs
# the full merged-PR forensics against the GitHub API (it never checks out PR
# head code), pins the exact release commit on a durable release-run/<version>
# recovery branch, and dispatches the release workflow. The pull_request_target
# trigger itself cannot be workflow_call, so it stays in the caller stub.

on:
    workflow_call:
        inputs:
            pr-number:
                description: "Merged release PR number."
                type: string
                required: true
            plugin-name:
                description: "Marker-string prefix."
                type: string
                required: true
            package-name:
                description: "Expected package.json name. Defaults to plugin-name."
                type: string
                required: false
                default: ""
            manifest-id:
                description: "Expected manifest.json id. Defaults to plugin-name."
                type: string
                required: false
                default: ""
            default-branch:
                description: "Release branch that PRs target."
                type: string
                required: false
                default: master
            package-manager:
                description: "npm or pnpm. Drives the expected release-file set."
                type: string
                required: false
                default: npm
            release-bot-app-slug:
                description: "GitHub App slug; the expected PR author is <slug>[bot]."
                type: string
                required: true
            release-merger-login:
                description: "Login required to have merged the PR. Empty means the repo owner."
                type: string
                required: false
                default: ""
            release-workflow:
                description: "Workflow file in the consumer repo to dispatch for the release."
                type: string
                required: false
                default: release.yml

permissions: {}

concurrency:
    group: release-validate-${{ github.repository }}
    cancel-in-progress: false

jobs:
    validate:
        name: Validate and dispatch release
        runs-on: ubuntu-latest
        permissions:
            actions: write
            contents: write
            pull-requests: read
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Validate, tag, and dispatch exact release
              uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
              env:
                  PR_NUMBER: ${{ inputs.pr-number }}
                  PLUGIN_NAME: ${{ inputs.plugin-name }}
                  PACKAGE_NAME: ${{ inputs.package-name || inputs.plugin-name }}
                  MANIFEST_ID: ${{ inputs.manifest-id || inputs.plugin-name }}
                  DEFAULT_BRANCH: ${{ inputs.default-branch }}
                  PACKAGE_MANAGER: ${{ inputs.package-manager }}
                  BOT_APP_SLUG: ${{ inputs.release-bot-app-slug }}
                  MERGER_LOGIN: ${{ inputs.release-merger-login }}
                  RELEASE_WORKFLOW: ${{ inputs.release-workflow }}
                  EVENT_REF: ${{ github.ref }}
                  EVENT_SHA: ${{ github.sha }}
              with:
                  script: |
                      const { isDeepStrictEqual } = require('node:util');

                      const plugin = process.env.PLUGIN_NAME;
                      const packageName = process.env.PACKAGE_NAME;
                      const manifestId = process.env.MANIFEST_ID;
                      const defaultBranch = process.env.DEFAULT_BRANCH;
                      const hasLock = process.env.PACKAGE_MANAGER === 'npm';
                      const botLogin = `${process.env.BOT_APP_SLUG}[bot]`;
                      const expectedFiles = hasLock
                        ? ['manifest.json', 'package-lock.json', 'package.json', 'versions.json']
                        : ['manifest.json', 'package.json', 'versions.json'];
                      const { owner, repo } = context.repo;
                      const repository = `${owner}/${repo}`;
                      const mergerLogin = process.env.MERGER_LOGIN || owner;
                      const pullNumber = Number(process.env.PR_NUMBER);
                      if (!Number.isSafeInteger(pullNumber) || pullNumber < 1) {
                        throw new Error('Release event has an invalid PR number.');
                      }

                      const { data: pull } = await github.rest.pulls.get({ owner, repo, pull_number: pullNumber });
                      if (!pull.merged || pull.state !== 'closed' || !pull.merged_at || !pull.merge_commit_sha) {
                        throw new Error(`PR #${pullNumber} is not merged.`);
                      }
                      if (pull.user?.login !== botLogin) {
                        throw new Error(`PR #${pullNumber} was not created by ${botLogin}.`);
                      }
                      if (pull.merged_by?.login !== mergerLogin) {
                        throw new Error(`PR #${pullNumber} was not merged by ${mergerLogin}.`);
                      }
                      if (pull.base.ref !== defaultBranch || pull.head.repo?.full_name !== repository) {
                        throw new Error(`PR #${pullNumber} has invalid base or repository provenance.`);
                      }
                      const branchMatch = /^release\/((?:0|[1-9]\d*)\.(?:0|[1-9]\d*)\.(?:0|[1-9]\d*))$/.exec(pull.head.ref);
                      if (!branchMatch) throw new Error(`PR #${pullNumber} does not use a valid release branch.`);
                      const version = branchMatch[1];
                      const title = `release(version): Release ${version}`;
                      if (pull.title !== title) throw new Error(`PR #${pullNumber} title does not match ${version}.`);

                      const markerPattern = new RegExp(
                        `<!-- ${plugin}-release-pr schema=1 version=${version.replaceAll('.', '\\.')}` +
                        ' base=([0-9a-f]{40}) -->',
                      );
                      const marker = markerPattern.exec(pull.body || '');
                      if (!marker) throw new Error(`PR #${pullNumber} is missing valid release provenance.`);
                      const baseSha = marker[1];

                      const files = await github.paginate(github.rest.pulls.listFiles, {
                        owner,
                        repo,
                        pull_number: pullNumber,
                        per_page: 100,
                      });
                      const changedFiles = files.map((file) => file.filename).sort();
                      if (JSON.stringify(changedFiles) !== JSON.stringify(expectedFiles)) {
                        throw new Error(`PR #${pullNumber} must change exactly the synchronized version files.`);
                      }

                      const headCommit = await github.rest.git.getCommit({ owner, repo, commit_sha: pull.head.sha });
                      if (headCommit.data.parents.length !== 1 || headCommit.data.parents[0].sha !== baseSha) {
                        throw new Error(`PR #${pullNumber} head does not descend directly from its recorded base.`);
                      }
                      if (headCommit.data.message.trim() !==
                          `${title}\n\n${plugin}-release-commit schema=1 version=${version} base=${baseSha}`) {
                        throw new Error(`PR #${pullNumber} head commit message is invalid.`);
                      }

                      const releaseSha = pull.merge_commit_sha;
                      const releaseCommit = await github.rest.git.getCommit({ owner, repo, commit_sha: releaseSha });
                      if (releaseCommit.data.parents.length !== 1 || releaseCommit.data.parents[0].sha !== baseSha) {
                        throw new Error(`PR #${pullNumber} was not squash-merged directly onto its recorded base.`);
                      }
                      if (releaseCommit.data.message.split('\n')[0] !== `${title} (#${pullNumber})`) {
                        throw new Error(`PR #${pullNumber} merge commit message is invalid.`);
                      }
                      if (releaseCommit.data.tree.sha !== headCommit.data.tree.sha) {
                        throw new Error(`PR #${pullNumber} merge tree does not match its validated head tree.`);
                      }
                      if (process.env.EVENT_REF !== `refs/heads/${defaultBranch}` || process.env.EVENT_SHA !== releaseSha) {
                        throw new Error(
                          `Release trigger must run from ${defaultBranch} at ${releaseSha}; got ` +
                          `${process.env.EVENT_REF} at ${process.env.EVENT_SHA}.`,
                        );
                      }

                      function assertRecord(value, label) {
                        if (typeof value !== 'object' || value === null || Array.isArray(value)) {
                          throw new Error(`${label} must be a JSON object.`);
                        }
                      }

                      function versionParts(value, label) {
                        if (typeof value !== 'string' ||
                            !/^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/.test(value)) {
                          throw new Error(`${label} is not a stable semantic version.`);
                        }
                        return value.split('.').map(Number);
                      }

                      function compareVersions(left, right) {
                        const leftParts = versionParts(left, 'candidate version');
                        const rightParts = versionParts(right, 'base version');
                        for (let index = 0; index < 3; index += 1) {
                          if (leftParts[index] !== rightParts[index]) {
                            return leftParts[index] - rightParts[index];
                          }
                        }
                        return 0;
                      }

                      function rootLockPackage(lock, label) {
                        assertRecord(lock.packages, `${label}.packages`);
                        const rootPackage = lock.packages[''];
                        assertRecord(rootPackage, `${label}.packages[""]`);
                        return rootPackage;
                      }

                      function synchronizedVersion(packageJson, lock, manifest, label) {
                        const values = [packageJson.version, manifest.version];
                        if (hasLock) values.push(lock.version, rootLockPackage(lock, label).version);
                        if (!values.every((value) => value === values[0])) {
                          throw new Error(`${label} version fields are not synchronized.`);
                        }
                        versionParts(values[0], `${label} version`);
                        return values[0];
                      }

                      function equalExceptField(candidate, baseline, field) {
                        const normalized = structuredClone(candidate);
                        normalized[field] = baseline[field];
                        return isDeepStrictEqual(normalized, baseline);
                      }

                      async function readJsonAt(ref, file) {
                        const response = await github.rest.repos.getContent({ owner, repo, path: file, ref });
                        const data = response.data;
                        if (Array.isArray(data) || data.type !== 'file' || data.encoding !== 'base64' ||
                            typeof data.content !== 'string') {
                          throw new Error(`Unable to read regular JSON file ${file} at ${ref}.`);
                        }
                        const value = JSON.parse(Buffer.from(data.content, 'base64').toString('utf8'));
                        assertRecord(value, `${file} at ${ref}`);
                        return value;
                      }

                      async function readVersionFiles(ref) {
                        const [packageJson, manifest, versions] = await Promise.all([
                          readJsonAt(ref, 'package.json'),
                          readJsonAt(ref, 'manifest.json'),
                          readJsonAt(ref, 'versions.json'),
                        ]);
                        const lock = hasLock ? await readJsonAt(ref, 'package-lock.json') : null;
                        return { packageJson, manifest, versions, lock };
                      }

                      const base = await readVersionFiles(baseSha);
                      const next = await readVersionFiles(releaseSha);
                      const baseVersion = synchronizedVersion(base.packageJson, base.lock, base.manifest, 'base');
                      const nextVersion = synchronizedVersion(next.packageJson, next.lock, next.manifest, 'release');
                      if (base.packageJson.name !== packageName || base.manifest.id !== manifestId ||
                          nextVersion !== version || compareVersions(nextVersion, baseVersion) <= 0) {
                        throw new Error('Release identity or version progression is invalid.');
                      }
                      if (typeof base.manifest.minAppVersion !== 'string' || !base.manifest.minAppVersion ||
                          typeof next.manifest.minAppVersion !== 'string' || !next.manifest.minAppVersion) {
                        throw new Error('Manifest compatibility versions must be non-empty strings.');
                      }
                      if (base.versions[baseVersion] !== base.manifest.minAppVersion ||
                          next.versions[nextVersion] !== next.manifest.minAppVersion) {
                        throw new Error('Release version history does not match manifest compatibility.');
                      }
                      if (!equalExceptField(next.packageJson, base.packageJson, 'version')) {
                        throw new Error('package.json changed outside its version field.');
                      }
                      if (hasLock) {
                        const normalizedLock = structuredClone(next.lock);
                        normalizedLock.version = base.lock.version;
                        rootLockPackage(normalizedLock, 'release lock').version =
                          rootLockPackage(base.lock, 'base lock').version;
                        if (!isDeepStrictEqual(normalizedLock, base.lock)) {
                          throw new Error('package-lock.json changed outside its version fields.');
                        }
                      }
                      if (!equalExceptField(next.manifest, base.manifest, 'version')) {
                        throw new Error('manifest.json changed outside its version field.');
                      }
                      if (Object.prototype.hasOwnProperty.call(base.versions, nextVersion)) {
                        throw new Error(`Base versions.json already contains ${nextVersion}.`);
                      }
                      const normalizedVersions = structuredClone(next.versions);
                      delete normalizedVersions[nextVersion];
                      if (!isDeepStrictEqual(normalizedVersions, base.versions)) {
                        throw new Error('versions.json changed outside the new release entry.');
                      }

                      const branchHead = await github.rest.git.getRef({ owner, repo, ref: `heads/${defaultBranch}` });
                      const comparison = await github.rest.repos.compareCommitsWithBasehead({
                        owner,
                        repo,
                        basehead: `${releaseSha}...${branchHead.data.object.sha}`,
                      });
                      if (!['ahead', 'identical'].includes(comparison.data.status) ||
                          comparison.data.merge_base_commit.sha !== releaseSha) {
                        throw new Error(`Release commit ${releaseSha} is not on current ${defaultBranch}.`);
                      }

                      async function resolveTagCommit(tag) {
                        let reference;
                        try {
                          reference = await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
                        } catch (error) {
                          if (error.status === 404) return null;
                          throw error;
                        }
                        let object = reference.data.object;
                        for (let depth = 0; object.type === 'tag' && depth < 5; depth += 1) {
                          const annotated = await github.rest.git.getTag({ owner, repo, tag_sha: object.sha });
                          object = annotated.data.object;
                        }
                        if (object.type !== 'commit') {
                          throw new Error(`Tag ${tag} does not resolve to a commit.`);
                        }
                        return object.sha;
                      }

                      const previousTagSha = await resolveTagCommit(baseVersion);
                      if (!previousTagSha) {
                        throw new Error(`Previous release tag ${baseVersion} does not exist.`);
                      }
                      const tag = await readVersionFiles(previousTagSha);
                      if (tag.packageJson.name !== packageName || tag.manifest.id !== manifestId ||
                          synchronizedVersion(tag.packageJson, tag.lock, tag.manifest, 'previous tag') !== baseVersion ||
                          tag.versions[baseVersion] !== tag.manifest.minAppVersion) {
                        throw new Error(`Previous release tag ${baseVersion} has invalid version metadata.`);
                      }
                      const previousComparison = await github.rest.repos.compareCommitsWithBasehead({
                        owner,
                        repo,
                        basehead: `${previousTagSha}...${baseSha}`,
                      });
                      if (!['ahead', 'identical'].includes(previousComparison.data.status) ||
                          previousComparison.data.merge_base_commit.sha !== previousTagSha) {
                        throw new Error(`Previous release tag ${baseVersion} is not an ancestor of the base.`);
                      }

                      const existingTagSha = await resolveTagCommit(version);
                      if (existingTagSha && existingTagSha !== releaseSha) {
                        throw new Error(`Tag ${version} points to ${existingTagSha}, expected ${releaseSha}.`);
                      }

                      const runBranch = `release-run/${version}`;
                      let runRef;
                      try {
                        runRef = await github.rest.git.getRef({ owner, repo, ref: `heads/${runBranch}` });
                      } catch (error) {
                        if (error.status !== 404) throw error;
                      }
                      if (runRef && runRef.data.object.sha !== releaseSha) {
                        throw new Error(
                          `Recovery branch ${runBranch} points to ${runRef.data.object.sha}, expected ${releaseSha}.`,
                        );
                      }
                      if (!runRef) {
                        await github.rest.git.createRef({ owner, repo, ref: `refs/heads/${runBranch}`, sha: releaseSha });
                      }

                      await github.rest.actions.createWorkflowDispatch({
                        owner,
                        repo,
                        workflow_id: process.env.RELEASE_WORKFLOW,
                        ref: runBranch,
                        inputs: { releasePr: String(pullNumber) },
                      });
                      core.notice(`Dispatched ${plugin} ${version} from release PR #${pullNumber} at ${runBranch}.`);
