name: Dependency Review

# Caller stub for the reusable dependency-review workflow. Copy to
# .github/workflows/dependency-review.yml.
#
# NO paths-ignore, so lockfile bumps are always scanned.
on:
    pull_request:
        branches: [master]

permissions:
    contents: read

jobs:
    dependency-review:
        uses: chhoumann/obsidian-plugin-workflows/.github/workflows/dependency-review.yml@v1
        permissions:
            contents: read
            pull-requests: write
        # with:
        #     fail-on-severity: moderate
        #     fail-on-scopes: "runtime, development"
