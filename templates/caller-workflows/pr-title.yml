name: PR Title

# Caller stub for the reusable PR-title workflow. Copy to
# .github/workflows/pr-title.yml.
#
# MUST be pull_request_target: the title of a fork PR is only reliably readable,
# and GITHUB_TOKEN only carries the right context, under this trigger. The
# reusable workflow never checks out PR head code, so this is safe. The validated
# title becomes the squash-merge commit, which drives the semantic-release
# version.
on:
    pull_request_target:
        types: [opened, edited, synchronize, reopened]

permissions:
    pull-requests: read

jobs:
    pr-title:
        uses: chhoumann/obsidian-plugin-workflows/.github/workflows/pr-title.yml@v1
        permissions:
            pull-requests: read
        # with:
        #     types: |
        #         feat
        #         fix
        #         ...
